<!DOCTYPE html>
<html>
<head>
    <title>Find Match</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background:#f5f7fb;">

<nav class="navbar navbar-dark bg-primary">
    <div class="container-fluid">
        <span class="navbar-brand">🔍 Match Finder</span>
    </div>
</nav>

<div class="container mt-5 text-center">

    <div class="card shadow p-4">

        <h3 class="mb-3">{{ item[3] }}</h3>

        <img src="{{ url_for('uploaded_file', filename=item[4]) }}"
             width="250"
             class="rounded mb-3">

        <br>

        <button onclick="findMatch()" class="btn btn-primary">
            🔎 Find Match
        </button>

        <h4 id="result" class="mt-4"></h4>

        <div id="matchImage" class="mt-3"></div>

    </div>

</div>

<script>
function findMatch() {
    fetch("/find_match/{{ item[0] }}")
    .then(res => res.json())
    .then(data => {

        if(data.status === "found") {

            document.getElementById("result").innerHTML =
                "✅ Match Found: " + data.title;

            document.getElementById("matchImage").innerHTML =
                `<img src="/uploads/${data.image}" width="200" class="rounded shadow">`;

        } else {

            document.getElementById("result").innerHTML =
                "❌ No match found";

            document.getElementById("matchImage").innerHTML = "";
        }
    });
}
</script>

</body>
</html>
